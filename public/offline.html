<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Fazumi</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(36, 112, 82, 0.14), transparent 40%),
          #f5f2ec;
        color: #193129;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(420px, 100%);
        padding: 32px;
        border: 1px solid rgba(25, 49, 41, 0.1);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 20px 50px rgba(17, 24, 39, 0.08);
        text-align: center;
      }

      .icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: rgba(36, 112, 82, 0.12);
        color: #247052;
        font-size: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 20px;
        color: #64746d;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      button,
      a {
        appearance: none;
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      button {
        background: #247052;
        color: #fff;
      }

      a {
        background: rgba(25, 49, 41, 0.06);
        color: #193129;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon">!</div>
      <h1>You are offline</h1>
      <p>Reconnect to load fresh summaries. Cached pages may still be available on this device.</p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Try again</button>
        <a href="/">Go home</a>
      </div>
    </main>
  </body>
</html>
